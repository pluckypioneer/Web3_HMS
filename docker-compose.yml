version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hms-postgres
    environment:
      POSTGRES_DB: hms_db
      POSTGRES_USER: hms_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "127.0.0.1:5432:5432"  # Only bind to localhost
    networks:
      - hms-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: postgres

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - "127.0.0.1:6379:6379"  # Only bind to localhost
    volumes:
      - redis_data:/data
    networks:
      - hms-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: redis-server --requirepass ${REDIS_PASSWORD:-default_redis_password} --appendonly yes

  # IPFS Node
  ipfs:
    image: ipfs/go-ipfs:latest
    container_name: hms-ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
    networks:
      - hms-network
    restart: unless-stopped

  # Ethereum Node (Ganache for development)
  ganache:
    image: trufflesuite/ganache-cli:latest
    container_name: hms-ganache
    command: ganache-cli --host 0.0.0.0 --port 8545 --accounts 10 --defaultBalanceEther 100
    ports:
      - "8545:8545"
    networks:
      - hms-network
    restart: unless-stopped

  # Flask Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hms-backend
    environment:
      - DATABASE_URL=postgresql://hms_user:${POSTGRES_PASSWORD:-default_password}@postgres:5432/hms_db
      - REDIS_URL=redis://:${REDIS_PASSWORD:-default_redis_password}@redis:6379/0
      - WEB3_PROVIDER_URL=http://ganache:8545
      - IPFS_URL=http://ipfs:5001
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-in-production}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-jwt-secret-key-in-production}
    ports:
      - "127.0.0.1:5000:5000"  # Only bind to localhost
    depends_on:
      - postgres
      - redis
      - ipfs
      - ganache
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs  # 添加日志卷
    networks:
      - hms-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Vue Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hms-frontend
    environment:
      - VITE_API_URL=http://backend:5000
    ports:
      - "127.0.0.1:3000:3000"  # Only bind to localhost
    depends_on:
      - backend
    networks:
      - hms-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: hms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf  # 自定义Nginx配置
      - ./nginx/ssl:/etc/nginx/ssl  # SSL证书（可选，生产环境用）
    depends_on:
      - frontend
      - backend
    networks:
      - hms-network
    restart: unless-stopped

volumes:
  postgres_data:  # PostgreSQL数据持久化
  redis_data:     # Redis数据持久化
  ipfs_data:      # IPFS节点数据持久化
  backend_uploads: # 后端上传文件持久化
  backend_logs:   # 后端日志持久化

networks:
  hms-network:
    driver: bridge  # 自定义桥接网络，服务间可通过服务名通信
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Docker secrets for sensitive data
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt